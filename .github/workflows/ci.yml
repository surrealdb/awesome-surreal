name: CI
permissions:
    contents: read
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    Lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0
            - run: npx awesome-lint
